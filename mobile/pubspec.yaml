name: fence
description: Family location sharing app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Networking
  dio: ^5.7.0
  web_socket_channel: ^3.0.2

  # Maps
  google_maps_flutter: ^2.12.1

  # Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3

  # Location
  geolocator: ^13.0.2
  permission_handler: ^11.4.0

  # Firebase
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5

  # Navigation
  go_router: ^14.8.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
