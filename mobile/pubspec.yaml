name: fence
description: Family location sharing app
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  # State management
  flutter_riverpod: ^2.6.1

  # Networking
  dio: ^5.7.0
  web_socket_channel: ^3.0.2

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3

  # Location
  geolocator: ^14.0.0
  flutter_foreground_task: ^9.2.0
  native_geofence: ^1.2.0
  battery_plus: ^6.0.0
  permission_handler: ^11.0.0

  # Firebase
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5

  # Local notifications
  flutter_local_notifications: ^19.0.0

  # Google Sign-In
  google_sign_in: ^6.2.2

  # Navigation
  go_router: ^14.8.1

  # Sharing & Deep Links
  share_plus: ^10.1.4
  app_links: ^6.3.3

  # In-App Purchases
  purchases_flutter: ^8.0.0

  # Image picker
  image_picker: ^1.1.2

  # Utilities
  url_launcher: ^6.3.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  very_good_analysis: ^7.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true
